    points="379,570 479,570 532,543 579,518 608,507 633,505 662,514 710,541 760,568 875,568 842,628 756,628 699,600 657,580 630,576 604,581 556,604 504,629 415,629"
    fill="url(#setaraGradient)"/>

  <!-- component 3: lower wavy line -->
  <polygon
    id="wave-lower"
    points="379,720 480,720 532,693 580,668 608,657 633,655 662,664 710,691 760,718 875,718 842,778 756,778 699,750 657,730 630,726 604,731 556,754 504,779 415,779"
    fill="url(#setaraGradient)"/>
</svg>
