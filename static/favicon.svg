<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-label="Setara polygon logo">
  <defs>
    <linearGradient id="setaraGradient" x1="228" y1="967" x2="980" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00A6CF"/>
      <stop offset="0.5" stop-color="#2FE3C5"/>
      <stop offset="1" stop-color="#98F0C9"/>
