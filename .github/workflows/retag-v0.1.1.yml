name: Retag v0.1.1

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  retag:
    if: github.event.head_commit.message == 'chore: retag v0.1.1'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move v0.1.1 to optimized CI commit
        run: |
          git tag --force v0.1.1 5f7046eb7d1765fdee1ddf30dd48e95066512f79
          git push origin refs/tags/v0.1.1 --force
